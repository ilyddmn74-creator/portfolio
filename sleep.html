<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen - Soundscape</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --text-color: #ffffff;
            --accent-muted: #2a2a2a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            transition: opacity 0.8s ease;
        }

        .loader-text {
            font-family: 'Cinzel', serif; color: var(--gold);
            letter-spacing: 4px; margin-top: 20px; font-size: 0.8rem;
        }

        .container { width: 100%; max-width: 500px; padding: 40px 20px; text-align: center; z-index: 1; }

        h1 {
            font-family: 'Cinzel', serif; font-weight: 700; letter-spacing: 8px;
            text-transform: uppercase; color: var(--gold); margin-bottom: 40px;
            text-shadow: 0 0 15px var(--gold-glow);
        }

        .power-wrapper { margin-bottom: 60px; position: relative; display: inline-block; }

        .power-btn {
            width: 120px; height: 120px; border-radius: 50%; background: transparent;
            border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px var(--gold-glow); position: relative; z-index: 2;
        }

        .power-btn svg { width: 50px; height: 50px; fill: var(--gold); transition: all 0.5s ease; }

        .power-btn.active { background: var(--gold); box-shadow: 0 0 40px var(--gold); }
        .power-btn.active svg { fill: var(--bg-color); }

        .power-pulse {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%; border: 2px solid var(--gold); opacity: 0; z-index: 1;
        }
        .active ~ .power-pulse { animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .sound-grid { display: grid; grid-template-columns: 1fr; gap: 25px; margin-bottom: 40px; }

        .sound-control {
            background: rgba(20, 20, 20, 0.6); border: 1px solid var(--accent-muted);
            border-radius: 15px; padding: 20px; transition: border-color 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .sound-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        .sound-label { display: flex; align-items: center; font-size: 0.8rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

        .sound-icon { width: 18px; height: 18px; margin-right: 12px; fill: var(--gold); }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 3px; cursor: pointer; background: var(--accent-muted); border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { height: 16px; width: 16px; border-radius: 50%; background: var(--gold); cursor: pointer; -webkit-appearance: none; margin-top: -6px; box-shadow: 0 0 8px var(--gold-glow); transition: transform 0.2s ease; }

        .presets { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .preset-btn {
            background: transparent; border: 1px solid var(--gold-glow); color: var(--text-color);
            padding: 8px 16px; border-radius: 30px; font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: all 0.3s ease;
        }
        .preset-btn:hover { background: var(--gold-glow); border-color: var(--gold); }
    </style>
</head>
<body>

    <div id="loader">
        <svg width="40" height="40" viewBox="0 0 38 38" stroke="#d4af37">
            <g fill="none" fill-rule="evenodd"><g transform="translate(1 1)" stroke-width="2"><circle stroke-opacity=".2" cx="18" cy="18" r="18"/><path d="M36 18c0-9.94-8.06-18-18-18"><animateTransform attributeName="transform" type="rotate" from="0 18 18" to="360 18 18" dur="1s" repeatCount="indefinite"/></path></g></g>
        </svg>
        <div class="loader-text">Harmonizing Atmosphere...</div>
    </div>

    <div class="container">
        <h1>Zen</h1>

        <div class="power-wrapper">
            <button id="masterPower" class="power-btn" aria-label="Master Power">
                <svg viewBox="0 0 24 24"><path d="M13,3H11V13H13V3M17.83,5.17L16.41,6.59C17.39,7.56 18,8.9 18,10.38C18,13.5 15.5,16 12.5,16C9.5,16 7,13.5 7,10.38C7,8.9 7.61,7.56 8.59,6.59L7.17,5.17C5.81,6.53 5,8.4 5,10.38C5,14.5 8.36,17.88 12.5,17.88C16.64,17.88 20,14.5 20,10.38C20,8.4 19.19,6.53 17.83,5.17Z" /></svg>
            </button>
            <div class="power-pulse"></div>
        </div>

        <div class="sound-grid">
            <div class="sound-control">
                <div class="sound-header"><span class="sound-label"><svg class="sound-icon" viewBox="0 0 24 24"><path d="M12,20A6,6 0 0,1 6,14C6,10 12,3.25 12,3.25C12,3.25 18,10 18,14A6,6 0 0,1 12,20Z" /></svg>Deep Rain</span><span id="rain-val">0%</span></div>
                <input type="range" id="rain-slider" min="0" max="1" step="0.01" value="0">
            </div>
            <div class="sound-control">
                <div class="sound-header"><span class="sound-label"><svg class="sound-icon" viewBox="0 0 24 24"><path d="M20,18H4V16H20V18M20,14H4V12H20V14M20,10H4V8H20V10M20,6H4V4H20V6Z" /></svg>Ocean Waves</span><span id="ocean-val">0%</span></div>
                <input type="range" id="ocean-slider" min="0" max="1" step="0.01" value="0">
            </div>
            <div class="sound-control">
                <div class="sound-header"><span class="sound-label"><svg class="sound-icon" viewBox="0 0 24 24"><path d="M17.66,11.2C17.43,10.9 17.15,10.64 16.89,10.38C16.22,9.7 15.46,9.03 15.46,7.73C15.46,6.47 16.14,5.4 16.71,4.38C17.25,3.41 16.74,2.09 15.63,2.23C14.58,2.37 13.61,3.07 12.87,3.81C10.59,6.13 10.53,9.8 12.55,12.35C12.71,12.56 13,12.83 13,13.12C13,13.44 12.75,13.73 12.44,13.77C12.13,13.83 11.8,13.63 11.59,13.41C10.15,11.95 10.15,9.75 10.15,7.74C10.15,6.74 10.06,5.7 9.4,4.92C9,4.44 8.23,4.2 7.76,4.6C6.83,5.36 6.38,6.55 6.35,7.76C6.3,9.89 7.41,11.83 8.92,13.33C9.37,13.8 9.93,14.23 10.11,14.89C10.41,15.85 9.91,16.88 9.07,17.39C8.23,17.9 7.16,17.83 6.3,17.25C5.41,16.65 4.88,15.58 4.85,14.5C4.85,14.13 4.46,13.88 4.13,14.07C3.03,14.71 2.31,16 2.08,17.26C1.72,19.34 2.46,21.57 4.13,22.81C5.8,24.05 8.05,24.09 9.83,23.19C13.07,21.55 14.53,17.65 13.14,14.44C13.06,14.27 13,14.11 13,13.93C13,13.66 13.26,13.58 13.4,13.43C14.78,12.11 16.47,13.78 17.75,14.84C18.94,15.81 20.3,16.81 21.36,18.07C22.69,19.62 22.84,21.78 21.82,23.57C21.64,23.88 22.1,24.22 22.35,23.94C23.64,22.4 23.92,20.19 23.15,18.25C22.38,16.31 20.8,14.81 19.25,13.5C18.66,13 18.08,12.5 17.65,11.83C17.58,11.72 17.5,11.61 17.43,11.5C17.4,11.4 17.56,11.3 17.66,11.2Z" /></svg>Campfire</span><span id="fire-val">0%</span></div>
                <input type="range" id="fire-slider" min="0" max="1" step="0.01" value="0">
            </div>
            <div class="sound-control">
                <div class="sound-header"><span class="sound-label"><svg class="sound-icon" viewBox="0 0 24 24"><path d="M12,3V12.26C11.44,12.09 10.83,12 10.2,12C8.1,12 6.39,13.71 6.39,15.81C6.39,17.91 8.1,19.62 10.2,19.62C12.3,19.62 14.01,17.91 14.01,15.81V7H18V3H12Z" /></svg>Zen Piano</span><span id="zen-val">0%</span></div>
                <input type="range" id="zen-slider" min="0" max="1" step="0.01" value="0">
            </div>
            <div class="sound-control">
                <div class="sound-header"><span class="sound-label"><svg class="sound-icon" viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6A6,6 0 0,0 6,12A6,6 0 0,0 12,18A6,6 0 0,0 18,12A6,6 0 0,0 12,6M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8Z" /></svg>Wind Chimes</span><span id="chime-val">0%</span></div>
                <input type="range" id="chime-slider" min="0" max="1" step="0.01" value="0">
            </div>
        </div>

        <div class="presets">
            <button class="preset-btn" data-preset="luks">Lüks Gece</button>
            <button class="preset-btn" data-preset="derin">Derin Yağmur</button>
            <button class="preset-btn" data-preset="altin">Altın Meditasyon</button>
        </div>
    </div>

    <script>
        const audioData = {
            rain: "https://www.soundjay.com/nature/rain-01.mp3",
            ocean: "https://www.soundjay.com/nature/ocean-wave-1.mp3",
            fire: "https://www.soundjay.com/nature/fire-1.mp3",
            zen: "https://www.soundjay.com/misc/sounds/wind-chime-1.mp3",
            chimes: "https://www.soundjay.com/misc/sounds/wind-chime-1.mp3"
        };

        const audios = {};
        const loader = document.getElementById('loader');
        let isPlaying = false;

        function hideLoader() {
            if (!loader) return;
            loader.style.opacity = '0';
            setTimeout(() => {
                if (loader) loader.style.display = 'none';
            }, 800);
        }

        // Fail-safe: Always hide loader after timeout
        const loadTimeout = setTimeout(hideLoader, 3000);

        // Pre-initialize objects
        const sliders = ['rain', 'ocean', 'fire', 'zen', 'chimes'];

        const loadPromises = Object.keys(audioData).map(key => {
            return new Promise((resolve) => {
                try {
                    const audio = new Audio();
                    audio.crossOrigin = "anonymous";
                    audio.src = audioData[key];
                    audio.loop = true;
                    audio.volume = 0;
                    audios[key] = audio;
                    
                    audio.addEventListener('canplaythrough', resolve, { once: true });
                    audio.addEventListener('error', resolve, { once: true });
                    // Also resolve if it takes too long for this specific asset
                    setTimeout(resolve, 2500);
                } catch(e) {
                    console.error(e);
                    resolve();
                }
            });
        });

        Promise.all(loadPromises).then(() => {
            clearTimeout(loadTimeout);
            hideLoader();
        }).catch(() => {
            hideLoader();
        });

        const masterPower = document.getElementById('masterPower');
        if (masterPower) {
            masterPower.addEventListener('click', () => {
                isPlaying = !isPlaying;
                masterPower.classList.toggle('active', isPlaying);
                Object.values(audios).forEach(a => {
                    if (isPlaying) {
                        a.play().catch(e => console.log("Autoplay blocked or load failed"));
                    } else {
                        a.pause();
                    }
                });
            });
        }

        sliders.forEach(key => {
            const slider = document.getElementById(`${key}-slider`);
            const label = document.getElementById(`${key}-val`);
            if (slider && label) {
                slider.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    label.innerText = Math.round(val * 100) + '%';
                    if (audios[key]) audios[key].volume = val;
                });
            }
        });

        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!isPlaying && masterPower) masterPower.click();
                const preset = btn.dataset.preset;
                const config = { rain: 0, ocean: 0, fire: 0, zen: 0, chimes: 0 };
                if (preset === 'luks') { config.ocean = 0.5; config.zen = 0.4; config.chimes = 0.3; }
                else if (preset === 'derin') { config.rain = 0.7; config.fire = 0.3; }
                else if (preset === 'altin') { config.zen = 0.6; config.chimes = 0.5; }

                Object.keys(config).forEach(key => {
                    const slider = document.getElementById(`${key}-slider`);
                    if (slider) {
                        slider.value = config[key];
                        slider.dispatchEvent(new Event('input'));
                    }
                });
            });
        });
    </script>
</body>
</html>
